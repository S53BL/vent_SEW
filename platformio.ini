; PlatformIO Project Configuration File - vent_SEW
; Plosca: Waveshare ESP32-S3-Touch-LCD-2
;   - ESP32-S3R8 (dual-core LX7, 240MHz, 8MB PSRAM OPI, 16MB Flash)
;   - ST7789T3 240x320 SPI display + CST816D capacitive touch (I2C)
;   - QMI8658C 6-axis IMU (I2C, skupen bus s touch)
;   - OV2640/OV5640 DVP camera interface (24-pin FPC)
;   - TF card slot (SPI, skupen bus z display)
;   - LiPo charger (ETA6098), USB-C
;
; Zunanji senzorji (I2C bus 1):
;   - SHT41  (temperatura, vlaznost)
;   - BME680 (tlak, IAQ, eCO2, breathVOC via BSEC)
;   - TCS34725 (svetloba, CCT)
;   - PIR (gibanje, digitalni vhod)
;
; https://docs.platformio.org/page/projectconf.html
;
; POPRAVKI (2026-03-02):
;   - FIX: BSEC verzija popravljena 1.7.4.2 → 1.4.9.2
;     Verzija 1.7.x ne obstaja v PlatformIO registru - PlatformIO javlja napako
;     pri resoluciji odvisnosti. Zadnja veljavna stable verzija je 1.4.9.2.
;
; POPRAVKI (2026-03-02 v2):
;   - FIX: Dodana espressif/esp32-camera @ ^2.0.0
;     cam.cpp: #include <esp_camera.h> zahteva to knjiznico.
;     esp_http_server.h je del espressif32 frameworka (ni treba dodajati).
;   - FIX: sensirion/Sensirion I2C SHT4x ostaja - header je SensirionI2cSht4x.h
;     (popravek napacnega #include <SensirionI2CSht4x.h> je v sens.cpp!)

[common]
build_flags_base =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -std=c++17
    -I.
    -Isrc
    -Ilib/drivers

[env:esp32s3]
platform         = espressif32
platform_packages = framework-arduinoespressif32 @ ~3.20014.0
board            = esp32-s3-devkitc-1
framework        = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
monitor_dtr     = 0
monitor_rts     = 0

upload_speed = 921600

build_flags =
    ${common.build_flags_base}
    -DBSEC_USE_DEFAULT_CONFIG

; Flash & PSRAM
; ESP32-S3R8: 16MB Flash QIO, 8MB PSRAM OPI
; Layout: nvs(32K) | otadata(8K) | ota_0(6.5M) | ota_1(6.5M) | littlefs(2.9M) | coredump(64K)
; NVS: "sew_cfg" (settings) + "sew_bsec" (BSEC state ~139B)
; LittleFS: logi + jpg snapshots + config.json
; Chart.js kot C header v firmware - ni locenega uploadfs
; 16MB Flash configuration (default)
; board_build.partitions          = partitions_16mb_ota.csv
; 8MB Flash configuration (for testing - uncomment below and comment line above)
board_build.partitions          = partitions_8mb_ota.csv
board_build.filesystem          = littlefs
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_opi
board_build.psram_type          = opi

lib_deps =
    ; --- SD kartica ---

    ; --- Kamera ---
    ; FIX (2026-03-02 v2): Dodana esp32-camera knjiznica!
    ; cam.cpp: #include <esp_camera.h> - ta header je v tej knjiznici, NE v frameworku.
    ; esp_http_server.h je del espressif32 frameworka - ze prisoten brez dodajanja.
    espressif/esp32-camera @ ^2.0.0

    ; --- Senzorji ---
    ; OPOMBA: Pravi header je SensirionI2cSht4x.h (malo 'c', malo 'x').
    ; sens.cpp je bil popravljen: SensirionI2CSht4x.h → SensirionI2cSht4x.h
    sensirion/Sensirion I2C SHT4x @ ^1.0.0
    ; BSEC2 + BME68x - direktno z GitHuba (PlatformIO registry ne pozna uradnih imen)
    ; Bosch-BSEC2-Library vsebuje ESP32-S3 binarijo (xtensa-esp32s3-elf-gcc)
    https://github.com/boschsensortec/Bosch-BSEC2-Library.git
    https://github.com/boschsensortec/Bosch-BME68x-Library.git
    adafruit/Adafruit TCS34725 @ ^1.4.2
    adafruit/Adafruit BusIO @ ^1.14.5

    ; --- Web / JSON ---
    me-no-dev/AsyncTCP
    me-no-dev/ESPAsyncWebServer
    bblanchon/ArduinoJson @ ^6.21.0

    ; --- LVGL (graficna knjiznica) ---
    lvgl/lvgl @ ^8.4.0

    ; --- ezTime (cas in NTP) ---
    ropg/ezTime

[env:esp32s3_debug]
extends          = env:esp32s3
build_type       = debug
build_flags =
    ${common.build_flags_base}
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
    -DDEBUG_BUILD=1
monitor_filters  = esp32_exception_decoder, colorize
upload_speed     = 460800
